<style>
body{
  margin:0;

  background:#f2f2f2;
}

/* Cartoon Image */
.hero{
  height:80vh;
  background:url("https://i.imgur.com/8Qf4G3B.png") center/contain no-repeat;
  background-color:#ffffff;
}

/* Bottom Navigation */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#ffffff;
  border-top:1px solid #ccc;
}

.nav a{
  flex:1;
  text-align:center;
  padding:12px 0;
  text-decoration:none;
  font-weight:bold;
  color:#333;
}

.nav a:hover{
  background:#e6e6e6;
}

/* Content */
.content{
  padding:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="content">

<div class="nav">
