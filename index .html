<!DOCTYPE html>
<html>
<head>
    <title>Image ke upar Text</title>
    <style>
        .image-box {
            position: relative;
            width: 400px;   /* image size */
        }

        .image-box img {
            width: 100%;
            height: auto;
        }

        .image-text {
            position: absolute;
            top: 50%;          /* upar-neeche position */
            left: 50%;         /* left-right position */
            transform: translate(-50%, -50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0,0,0,0.5); /* text ke peeche halka background */
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="image-box">
        <img src="image.jpg" alt="Stone Image">
        <div class="image-text">Yahan Text Likhiye</div>
    </div>

</body>
</html>
